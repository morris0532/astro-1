eyebrow:
  type: text
  comment: Optional eyebrow text shown above the heading.
heading:
  type: text
  comment: Main heading for the team grid.
subtext:
  type: textarea
  comment: Supporting copy beneath the heading.
layout:
  comment: How team member cards align in the grid (matches Grid layout).
  type: select
  options:
    values:
      - id: start
        name: Left Aligned
      - id: center
        name: Center Aligned
teamMembers:
  type: array
  label: Team Members
  comment: Team member cards rendered in the grid.
  options:
    structures: _structures.teamGridItems
