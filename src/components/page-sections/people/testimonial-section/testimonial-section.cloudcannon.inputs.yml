text:
  type: markdown
  comment: The testimonial quote text.
  options:
    blockquote: false
    bold: true
    format:
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
authorName:
  type: text
  comment: Name of the testimonial author.
authorDescription:
  type: text
  comment: Title or description of the author (e.g., job title, company).
authorImage:
  type: image
  comment: Photo of the testimonial author.
  options:
    paths:
      uploads: src/assets/images
      static: ""
    resize_style: contain
    width: 1920
    height: 1280
alignmentHorizontal:
  type: select
  comment: Horizontal alignment of the testimonial content.
  options:
    values:
      - id: center
        name: Center
      - id: start
        name: Start
      - id: end
        name: End
