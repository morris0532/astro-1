featureSlider:
  snippet: <FeatureSlider id=[[id]] slides={[[slides]]} paddingVertical=[[paddingVertical]] colorScheme=[[colorScheme]] backgroundColor=[[backgroundColor]] rounded=[[rounded]] />
  inline: false
  preview:
    text:
      - Feature Slider
    subtext:
      - key: id
    icon: view_carousel
  params:
    id:
      parser: argument
      options:
        model:
          editor_key: id
          type: string
          optional: true
          remove_empty: true
    slides:
      parser: argument
      options:
        model:
          editor_key: slides
          type: array
    paddingVertical:
      parser: argument
      options:
        model:
          editor_key: paddingVertical
          type: string
          optional: true
          remove_empty: true
    colorScheme:
      parser: argument
      options:
        model:
          editor_key: colorScheme
          type: string
          optional: true
          remove_empty: true
    backgroundColor:
      parser: argument
      options:
        model:
          editor_key: backgroundColor
          type: string
          optional: true
          remove_empty: true
    rounded:
      parser: argument
      options:
        model:
          editor_key: rounded
          type: boolean
          optional: true
          remove_empty: false
  _inputs_from_glob:
    - /src/components/page-sections/features/feature-slider/feature-slider.cloudcannon.inputs.yml
